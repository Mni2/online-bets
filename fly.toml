app = "nova-backend"
primary_region = "bom"
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "apps/backend/Dockerfile"

[env]
  NODE_ENV = "production"
  BACKEND_PORT = "4000"
  HOUSE_EDGE_BPS = "150"
  BCRYPT_ROUNDS = "12"

[[services]]
  internal_port = 4000
  protocol = "tcp"
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [services.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

  [services.http_checks]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "get"
    path = "/api/health"

[deploy]
  release_command = "npx prisma migrate deploy --schema packages/database/prisma/schema.prisma && npx tsx packages/database/prisma/seed.ts"
  strategy = "rolling"
