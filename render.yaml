services:
  - type: web
    name: nova-backend
    runtime: docker
    plan: free
    dockerfilePath: ./apps/backend/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_PORT
        value: "4000"
      - key: DATABASE_URL
        fromDatabase:
          name: nova-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: PROVABLY_FAIR_HMAC_KEY
        generateValue: true
      - key: PROVABLY_FAIR_SERVER_SEED
        generateValue: true
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: HOUSE_EDGE_BPS
        value: "150"

databases:
  - name: nova-db
    plan: free
    databaseName: nova_royale
    user: nova
