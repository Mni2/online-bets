services:
  - type: web
    name: nova-backend
    runtime: docker
    plan: free
    dockerfilePath: ./apps/backend/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_PORT
        value: "4000"
      - key: DATABASE_URL
        fromDatabase:
          name: nova-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: PROVABLY_FAIR_HMAC_KEY
        generateValue: true
      - key: PROVABLY_FAIR_SERVER_SEED
        generateValue: true
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: HOUSE_EDGE_BPS
        value: "150"

  - type: web
    name: nova-frontend
    runtime: static
    plan: free
    buildCommand: cd apps/frontend && npm install --legacy-peer-deps && npm run build
    staticPublishPath: ./apps/frontend/.next
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://nova-backend.onrender.com

  - type: web
    name: nova-admin
    runtime: static
    plan: free
    buildCommand: cd apps/admin && npm install --legacy-peer-deps && npm run build
    staticPublishPath: ./apps/admin/dist
    envVars:
      - key: VITE_API_URL
        value: https://nova-backend.onrender.com

databases:
  - name: nova-db
    plan: free
    databaseName: nova_royale
    user: nova
